openapi: 3.1.0
info:
  title: TeamSpark Pachinko API
  version: 1.0.0
  description: |
    HTTP API for policy configuration, message and alert review, analytics,
    Arcade Engine webhooks, retention, and application settings.

servers:
  - url: http://localhost:3000/api/v1
    description: API base (Next.js app)

tags:
  - name: Messages
    description: Ingested messages (JSON-RPC / filter pipeline)
  - name: Webhooks
    description: Arcade Engine pre/post policy hooks
  - name: Policies
    description: Policy definitions
  - name: PolicyElements
    description: Reusable conditions and actions
  - name: Alerts
    description: Policy alerts and review
  - name: Analytics
    description: Aggregates, time series, and filter dimensions
  - name: Settings
    description: Application and client UI settings
  - name: Retention
    description: Data retention maintenance
  - name: MessageActions
    description: Recommended actions for a message

components:
  schemas:
    Meta:
      type: object
      properties:
        apiVersion:
          type: string
          enum: ["1.0"]
        status:
          type: integer
          description: HTTP status code
        message:
          type: string
          description: Status message

    Error:
      type: object
      properties:
        meta:
          $ref: '#/components/schemas/Meta'

    ServerInfo:
      type: object
      properties:
        name:
          type: string
        version:
          type: string

    ServerStatus:
      type: object
      properties:
        serverInfo:
          $ref: '#/components/schemas/ServerInfo'
        lastSeen:
          type: string
          format: date-time
          nullable: true

    McpServerConfig:
      oneOf:
        - type: object
          required: [type, command]
          properties:
            type:
              type: string
              enum: [stdio]
            command:
              type: string
            args:
              type: array
              items:
                type: string
            env:
              type: object
              additionalProperties:
                type: string
            direct:
              type: boolean
        - type: object
          required: [type, url]
          properties:
            type:
              type: string
              enum: [sse]
            url:
              type: string
            headers:
              type: object
              additionalProperties:
                type: string
            direct:
              type: boolean
        - type: object
          required: [type, url]
          properties:
            type:
              type: string
              enum: [streamable]
            url:
              type: string
            headers:
              type: object
              additionalProperties:
                type: string
            direct:
              type: boolean

    McpServer:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        config:
          $ref: '#/components/schemas/McpServerConfig'
        enabled:
          type: boolean
        security:
          type: string
          enum: [network, container, wrapped, unmanaged]
          nullable: true
          description: Security type for the server
        status:
          type: object
          properties:
            serverInfo:
              type: object
              properties:
                name:
                  type: string
                version:
                  type: string
            lastSeen:
              type: string
              nullable: true

    Message:
      type: object
      properties:
        id:
          type: integer
        timestamp:
          type: string
          format: date-time
        userId:
          type: string
        clientId:
          type: string
        sourceIP:
          type: string
        serverName:
          type: string
        sessionId:
          type: string
        messageId:
          type: string
        payloadMethod:
          type: string
        payloadToolName:
          type: string
        params:
          type: object
          nullable: true
        result:
          type: object
          nullable: true
        error:
          type: object
          nullable: true
        requestAction:
          type: string
        rawParams:
          type: object
          nullable: true
        responseAction:
          type: string
        rawResult:
          type: object
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        timestampResult:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the message received a response

    MessageResponse:
      type: object
      properties:
        meta:
          $ref: '#/components/schemas/Meta'
        message:
          $ref: '#/components/schemas/Message'

    Pagination:
      type: object
      properties:
        total:
          type: integer
        remaining:
          type: integer
        hasMore:
          type: boolean
        nextCursor:
          type: integer
          nullable: true
        limit:
          type: integer
        sort:
          type: string
          enum: [asc, desc]

    TimeSeriesResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              timestamp:
                type: string
                format: date-time
                description: The timestamp for this data point
              counts:
                type: object
                additionalProperties:
                  type: number
                description: Map of dimension values to their counts at this timestamp
        query:
          type: object
          properties:
            dimension:
              type: string
              description: The dimension being queried
            timeUnit:
              type: string
              enum: [hour, day, week, month]
              description: The time unit used for grouping
            timeRange:
              type: object
              properties:
                start:
                  type: string
                  format: date-time
                  description: Start of the time range
                end:
                  type: string
                  format: date-time
                  description: End of the time range
            filters:
              type: object
              properties:
                serverName:
                  type: string
                serverId:
                  type: integer
                userId:
                  type: string
                clientId:
                  type: integer
                clientType:
                  type: string
                method:
                  type: string
                toolName:
                  type: string
                sourceIP:
                  type: string

    AggregateResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              value:
                type: string
                description: The value of the dimension
              count:
                type: integer
                description: The count of messages for this value
              success:
                type: integer
                description: The count of successful messages
              error:
                type: integer
                description: The count of error messages
        query:
          type: object
          properties:
            dimension:
              type: string
              description: The dimension being queried
            timeRange:
              type: object
              properties:
                start:
                  type: string
                  format: date-time
                  description: Start of the time range
                end:
                  type: string
                  format: date-time
                  description: End of the time range
            filters:
              type: object
              properties:
                serverName:
                  type: string
                userId:
                  type: string
                clientId:
                  type: string
                method:
                  type: string
                sourceIP:
                  type: string

    DimensionsResponse:
      type: object
      properties:
        data:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          description: Map of dimension names to arrays of their values
        query:
          type: object
          properties:
            dimensions:
              type: array
              items:
                type: string
                enum: [serverName, userId, clientId, method, sourceIP]
              description: The dimensions that were queried
            timeRange:
              type: object
              properties:
                start:
                  type: string
                  format: date-time
                  description: Start of the time range
                end:
                  type: string
                  format: date-time
                  description: End of the time range
            filters:
              type: object
              properties:
                serverName:
                  type: string
                userId:
                  type: string
                clientId:
                  type: string
                method:
                  type: string
                sourceIP:
                  type: string

    MessageFilterContext:
      type: object
      required:
        - user
        - sourceIp
        - serverToken
        - serverName
        - serverId
        - clientId
      properties:
        user:
          type: string
          description: End-user identifier for policy and logging
        sourceIp:
          type: string
          description: Originating IP or placeholder
        serverToken:
          type: string
          description: Must match the MCP server's stored token for serverId
        serverName:
          type: string
          description: Must match the registered server name for serverId
        serverId:
          type: integer
          description: Managed server id
        clientId:
          type: integer
          nullable: true
          description: Client id when applicable, or null

    ArcadeToolInfo:
      type: object
      required:
        - name
        - toolkit
        - version
      properties:
        name:
          type: string
        toolkit:
          type: string
        version:
          type: string
        metadata:
          type: object
          additionalProperties: true

    ArcadeToolContext:
      type: object
      additionalProperties: true
      properties:
        user_id:
          type: string
        metadata:
          type: object
          additionalProperties: true
        secrets:
          type: array
          items:
            type: string

    ArcadeFilterPreRequest:
      type: object
      required:
        - execution_id
        - tool
        - inputs
        - context
      properties:
        execution_id:
          type: string
        tool:
          $ref: '#/components/schemas/ArcadeToolInfo'
        inputs:
          type: object
          additionalProperties: true
        context:
          $ref: '#/components/schemas/ArcadeToolContext'

    ArcadeFilterPostRequest:
      type: object
      required:
        - execution_id
        - tool
        - context
      properties:
        execution_id:
          type: string
        tool:
          $ref: '#/components/schemas/ArcadeToolInfo'
        context:
          $ref: '#/components/schemas/ArcadeToolContext'
        inputs:
          type: object
          additionalProperties: true
        success:
          type: boolean
        output:
          description: Tool output (any JSON type)
        execution_code:
          type: string
        execution_error:
          type: string

    ArcadeHookResponseCode:
      type: string
      enum:
        - OK
        - CHECK_FAILED
        - RATE_LIMIT_EXCEEDED

    ArcadePreHookResult:
      type: object
      required:
        - code
      properties:
        code:
          $ref: '#/components/schemas/ArcadeHookResponseCode'
        error_message:
          type: string
        override:
          type: object
          properties:
            inputs:
              type: object
              additionalProperties: true
            secrets:
              type: array
              items:
                type: object
                additionalProperties:
                  type: string

    ArcadePostHookResult:
      type: object
      required:
        - code
      properties:
        code:
          $ref: '#/components/schemas/ArcadeHookResponseCode'
        error_message:
          type: string
        override:
          type: object
          properties:
            output:
              description: Overridden tool output (any JSON type)

    Client:
      type: object
      properties:
        id:
          type: string
        token:
          type: string
        type:
          type: string
        name:
          type: string
        description:
          type: string
        configPath:
          type: string
        autoUpdate:
          type: boolean
        enabled:
          type: boolean
        lastUpdated:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Policy:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        rules:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum: [allow, deny]
              conditions:
                type: object
                properties:
                  method:
                    type: string
                  serverName:
                    type: string
                  clientId:
                    type: string
                  userId:
                    type: string
        enabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Alert:
      type: object
      properties:
        alertId:
          type: integer
          description: Unique identifier for the alert
        messageId:
          type: integer
          description: ID of the message that triggered this alert
        policyId:
          type: integer
          description: ID of the policy that triggered this alert
        filterName:
          type: string
          description: Name of the filter that triggered this alert
        origin:
          type: string
          enum: [client, server]
          description: Origin of the message that triggered this alert
        redactions:
          type: object
          nullable: true
          description: Any redacted fields from the message
        timestamp:
          type: string
          format: date-time
          description: When the alert was triggered
        createdAt:
          type: string
          format: date-time
          description: When the alert was created
        seenAt:
          type: string
          format: date-time
          nullable: true
          description: When the alert was marked as seen
        policyName:
          type: string
          description: Name of the policy that triggered this alert
        policySeverity:
          type: integer
          description: Severity level of the policy
        serverId:
          type: integer
          description: ID of the server that generated the message
        clientId:
          type: integer
          description: ID of the client that generated the message
        clientType:
          type: string
          description: Type of the client that generated the message
      required:
        - alertId
        - messageId
        - policyId
        - filterName
        - timestamp
        - createdAt
        - policyName
        - policySeverity
        - serverId
        - clientId
        - clientType

    AlertFilter:
      type: object
      properties:
        messageId:
          type: integer
          description: Filter by message ID
        policyId:
          type: integer
          description: Filter by policy ID
        filterName:
          type: string
          description: Filter by filter name
        seen:
          type: boolean
          description: Filter by seen status
        severity:
          type: integer
          description: Filter by policy severity
        startTime:
          type: string
          format: date-time
          description: Filter alerts created after this time
        endTime:
          type: string
          format: date-time
          description: Filter alerts created before this time
        serverId:
          type: integer
          description: Filter by server ID
        clientId:
          type: integer
          description: Filter by client ID
        clientType:
          type: string
          description: Filter by client type

    AlertTimeSeriesQuery:
      type: object
      properties:
        dimension:
          type: string
          enum: [policyId, filterName, seen, severity, serverId, clientId, clientType]
          description: The dimension to group by
        timeUnit:
          type: string
          enum: [hour, day, week, month]
          description: The time unit to group by
        policyId:
          type: integer
          description: Filter by policy ID
        filterName:
          type: string
          description: Filter by filter name
        seen:
          type: boolean
          description: Filter by seen status
        severity:
          type: integer
          description: Filter by policy severity
        startTime:
          type: string
          format: date-time
          description: Filter alerts created after this time
        endTime:
          type: string
          format: date-time
          description: Filter alerts created before this time
        serverId:
          type: integer
          description: Filter by server ID
        clientId:
          type: integer
          description: Filter by client ID
        clientType:
          type: string
          description: Filter by client type

    AlertAggregateQuery:
      type: object
      properties:
        dimension:
          type: string
          enum: [policyId, filterName, seen, severity, serverId, clientId, clientType]
          description: The dimension to group by
        policyId:
          type: integer
          description: Filter by policy ID
        filterName:
          type: string
          description: Filter by filter name
        seen:
          type: boolean
          description: Filter by seen status
        severity:
          type: integer
          description: Filter by policy severity
        startTime:
          type: string
          format: date-time
          description: Filter alerts created after this time
        endTime:
          type: string
          format: date-time
          description: Filter alerts created before this time
        serverId:
          type: integer
          description: Filter by server ID
        clientId:
          type: integer
          description: Filter by client ID
        clientType:
          type: string
          description: Filter by client type

    ClientServerData:
      type: object
      properties:
        clientServerId:
          type: integer
          description: Unique identifier for the client-server relationship
        clientId:
          type: integer
          description: ID of the client
        serverId:
          type: integer
          description: ID of the server
        clientServerName:
          type: string
          description: Name by which the client refers to this server
        toolNames:
          type: array
          items:
            type: string
          description: Optional subset of tools to expose to this client
        createdAt:
          type: string
          format: date-time
          description: When the relationship was created
        updatedAt:
          type: string
          format: date-time
          description: When the relationship was last updated
      required:
        - clientServerId
        - clientId
        - serverId
        - clientServerName
        - createdAt
        - updatedAt

    ClientServerRelationshipWithServer:
      allOf:
        - $ref: '#/components/schemas/ClientServerData'
        - type: object
          properties:
            server:
              $ref: '#/components/schemas/Server'
              nullable: true

    ClientServerRelationshipWithClient:
      allOf:
        - $ref: '#/components/schemas/ClientServerData'
        - type: object
          properties:
            client:
              $ref: '#/components/schemas/Client'
              nullable: true

    BridgeStatus:
      type: object
      properties:
        running:
          type: boolean
        configuration:
          type: object
          properties:
            host:
              $ref: '#/components/schemas/ServerEndpointConfig'

    ClientEndpointLogEntry:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        message:
          type: string
        type:
          type: string
        clientName:
          type: string
        data:
          type: object
          additionalProperties: true

    ServerEndpointConfig:
      type: object
      properties:
        mode:
          type: string
          enum: [sse, streamable]
        host:
          type: string
        port:
          type: integer

    ClientComplianceData:
      type: object
      properties:
        clientId:
          type: integer
          description: Unique identifier for the client
        name:
          type: string
          description: Display name of the client
        type:
          type: string
          enum: [anthropic, cursor, roocode, vscode, windsurf, generic]
          description: Type of the client
        enabled:
          type: boolean
          description: Whether the client is enabled
        autoUpdate:
          type: boolean
          description: Whether the client has auto-update enabled
        isLinked:
          type: boolean
          description: Whether the client has a configuration path set (linked/managed client)
        lastScannedAt:
          type: string
          format: date-time
          nullable: true
          description: When the client was last scanned
        hasPendingOperations:
          type: boolean
          description: Whether the client has pending sync operations
        hasUnmanagedServers:
          type: boolean
          description: Whether the client has access to unmanaged servers
        hasNonSecureServers:
          type: boolean
          description: Whether the client has access to non-secure servers

    SystemComplianceData:
      type: object
      description: >
        Legacy fields requireClientToken and strictServerAccess are removed from the product.
        Arcade Engine policy webhooks may optionally require a shared API bearer (app setting filterApiBearerToken); see /webhooks/arcade/pre and /webhooks/arcade/post.
      additionalProperties: true

    ComplianceData:
      type: object
      properties:
        systemCompliance:
          $ref: '#/components/schemas/SystemComplianceData'
          description: System-level compliance settings
        clientCompliance:
          type: array
          items:
            $ref: '#/components/schemas/ClientComplianceData'
          description: Client-level compliance data

    ClientSettings:
      type: object
      properties:
        logLevel:
          type: string
          enum: [error, warn, info, debug, trace]
          description: The current log level for the client
        # Future client settings can be added here
        # theme: 'dark' | 'light';
        # language: string;
        # etc.

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            type: object
            properties:
              meta:
                $ref: '#/components/schemas/Meta'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            type: object
            properties:
              meta:
                $ref: '#/components/schemas/Meta'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            type: object
            properties:
              meta:
                $ref: '#/components/schemas/Meta'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              meta:
                $ref: '#/components/schemas/Meta'
    ServerError:
      description: Server error
      content:
        application/json:
          schema:
            type: object
            properties:
              meta:
                $ref: '#/components/schemas/Meta'

paths:
  /messages:
    get:
      tags: [Messages]
      summary: List messages
      parameters:
        - name: sort
          in: query
          schema: { type: string, enum: [asc, desc], default: desc }
        - name: cursor
          in: query
          schema: { type: integer }
        - name: origin
          in: query
          schema: { type: string, enum: [client, server] }
        - name: userId
          in: query
          schema: { type: string }
        - name: source
          in: query
          schema: { type: string }
        - name: payloadToolkit
          in: query
          schema: { type: string }
        - name: payloadMethod
          in: query
          schema: { type: string }
        - name: payloadToolName
          in: query
          schema: { type: string }
        - name: payloadMessageId
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Messages and pagination
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: "#/components/schemas/Meta"
                  messages:
                    type: array
                    items:
                      $ref: "#/components/schemas/Message"
                  pagination:
                    type: object
        "500":
          $ref: "#/components/responses/ServerError"

  /messages/{messageId}:
    get:
      tags: [Messages]
      summary: Get message by ID
      parameters:
        - name: messageId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Message detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Not found
        "500":
          $ref: "#/components/responses/ServerError"

  /messageActions/{messageId}:
    get:
      tags: [MessageActions]
      summary: Get recommended actions for a message
      parameters:
        - name: messageId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: JSON-API style payloads; messageAction may be null
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/ServerError"

  /webhooks/arcade/pre:
    post:
      tags: [Webhooks]
      summary: Arcade Engine pre-hook
      description: |
        Request/response shapes match Arcade (see docs/arcade/webhook.yaml).
        Optional Authorization Bearer token when app setting filterApiBearerToken is set.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArcadeFilterPreRequest"
      responses:
        "200":
          description: Arcade PreHookResult
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArcadePreHookResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  /webhooks/arcade/post:
    post:
      tags: [Webhooks]
      summary: Arcade Engine post-hook
      description: Same optional bearer as pre-hook; native Arcade response body on success.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArcadeFilterPostRequest"
      responses:
        "200":
          description: Arcade PostHookResult
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArcadePostHookResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  /analytics/messages/timeSeries:
    get:
      tags: [Analytics]
      summary: Message time series
      description: |
        The dimension query parameter accepts payloadMethod, payloadToolName, userId, source,
        payloadToolkit, or aliases method, toolName, serverName (mapped to payload fields).
      parameters:
        - name: dimension
          in: query
          required: true
          schema:
            type: string
            enum:
              - payloadMethod
              - payloadToolName
              - userId
              - source
              - payloadToolkit
              - method
              - toolName
              - serverName
        - name: timeUnit
          in: query
          required: true
          schema: { type: string, enum: [hour, day, week, month] }
        - name: userId
          in: query
          schema: { type: string }
        - name: source
          in: query
          schema: { type: string }
        - name: payloadToolkit
          in: query
